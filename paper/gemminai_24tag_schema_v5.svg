<rect x="60" y="712" width="580" height="22" rx="4" fill="#534AB7"/>
<text font-family="Helvetica Neue,Arial,sans-serif" font-size="11" x="340" y="727" text-anchor="middle" fill="#EEEDFE">state_hash = SHA-256( JCS( T01..T24 ) )  ·  RFC 8785</text>
